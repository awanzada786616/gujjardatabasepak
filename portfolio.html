<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Safdar Gujjar | Cyber Security Expert</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #7000ff;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 20%);
        }

        /* High Quality Container */
        .portfolio-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 95%;
            max-width: 600px;
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            margin: 20px;
        }

        /* Top Title Style */
        .group-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(to right, #00f2ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        /* Profile Image with Advanced Lighting Stroke */
        .image-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #000;
            z-index: 5;
            position: relative;
        }

        .lighting-stroke {
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f2ff, transparent, #7000ff, #00f2ff);
            background-size: 400%;
            z-index: 1;
            animation: rotate-stroke 4s linear infinite;
            filter: blur(2px);
        }

        .lighting-stroke::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: var(--bg-dark);
            border-radius: 50%;
            z-index: 2;
        }

        @keyframes rotate-stroke {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Main Expert Badge */
        .expert-badge {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary-color);
            padding: 8px 25px;
            border-radius: 50px;
            color: var(--primary-color);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* Professional Services Section */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            text-align: left;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid var(--primary-color);
            transition: 0.3s;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
        }

        .service-item i {
            color: var(--primary-color);
            margin-right: 8px;
        }

        .service-item span {
            font-size: 0.85rem;
            color: #ccc;
        }

        /* Slogan Styling */
        .king-slogan {
            font-size: 1.3rem;
            color: #fff;
            margin: 30px 0;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Personal Info */
        .name-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .address-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
            margin-top: 20px;
        }

        .flag-icon {
            display: block;
            font-size: 2rem;
            margin-top: 15px;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(10deg); }
        }

    </style>
</head>
<body>

    <div class="portfolio-card">
        <!-- Group Header -->
        <div class="group-title">Gujjar Sahab 71 Group</div>

        <!-- Animated Image Area -->
        <div class="image-wrapper">
            <div class="lighting-stroke"></div>
            <img src="https://i.ibb.co/Fbc5DtDb/IMG-20260318-WA0067.jpg" alt="Muhammad Safdar Gujjar">
        </div>

        <!-- Service Badge -->
        <div class="expert-badge">
            <i class="fas fa-shield-alt"></i> Cyber Security Expert
        </div>

        <!-- Added Professional Services -->
        <div class="services-grid">
            <div class="service-item">
                <i class="fas fa-user-secret"></i>
                <span>Ethical Hacking</span>
            </div>
            <div class="service-item">
                <i class="fas fa-lock"></i>
                <span>Data Protection</span>
            </div>
            <div class="service-item">
                <i class="fas fa-network-wired"></i>
                <span>Network Security</span>
            </div>
            <div class="service-item">
                <i class="fas fa-bug"></i>
                <span>Vulnerability Assessment</span>
            </div>
        </div>

        <!-- Slogan -->
        <div class="king-slogan">
            "We are king 👑 we never forgot"
        </div>

        <!-- Footer Details -->
        <div class="name-title">Muhammad Safdar Gujjar Faisalabadi</div>

        <div class="address-box">
            <i class="fas fa-map-marker-alt" style="color: #ff3e3e;"></i><br>
            Faisalabad International Airport Chonk,<br>
            Jhang Road Islampura.
            <span class="flag-icon">🚩</span>
        </div>
    </div>

</body>
  </html>
